name: Deploy Supabase Functions

on:
  push:
    branches:
      - main
    paths:
      - "supabase/**"
      - ".github/workflows/deploy-supabase-functions.yml"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        if: ${{ env.SUPABASE_PROJECT_ID != '' && env.SUPABASE_ACCESS_TOKEN != '' }}
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Skip when Supabase secrets are missing
        if: ${{ env.SUPABASE_PROJECT_ID == '' || env.SUPABASE_ACCESS_TOKEN == '' }}
        run: echo "Supabase secrets are not configured yet. Skipping function deployment."

      - name: Deploy leaderboard-list
        if: ${{ env.SUPABASE_PROJECT_ID != '' && env.SUPABASE_ACCESS_TOKEN != '' }}
        run: supabase functions deploy leaderboard-list --project-ref $SUPABASE_PROJECT_ID --no-verify-jwt

      - name: Deploy leaderboard-submit
        if: ${{ env.SUPABASE_PROJECT_ID != '' && env.SUPABASE_ACCESS_TOKEN != '' }}
        run: supabase functions deploy leaderboard-submit --project-ref $SUPABASE_PROJECT_ID --no-verify-jwt
