    createCombat(state, pickOne(profile.enemies), profile.zoneId, profile.rewards);
  } else if (chance(source.eventChance || 0.42)) {
    runEvent(state, "search");
  }

  evaluateProgression(state);
  return true;
}

function searchRubble(state) {
  return runScavengeSource(state, "rubble");
}

function burnForWarmth(state) {
  const derived = getDerivedState(state);
  if (state.resources.scrap < 12) {
    return false;
  }

  state.resources.scrap -= 12;
  state.stats.burnUses += 1;
  state.shelter.warmth = clamp(state.shelter.warmth + 2.6, 0, 10);
  state.shelter.noise = clamp(state.shelter.noise + 0.25, 0, 10);
  state.condition = clamp(state.condition + derived.burnCondition, 0, derived.maxCondition);
  addLog(state, "You feed the fire with old metal and buy yourself another stretch of feeling alive.", "build");
  evaluateProgression(state);
  return true;
}

function forageFood(state) {
  const derived = getDerivedState(state);
  advanceTime(state, 1);
  state.stats.foodSearches += 1;
  state.shelter.noise = clamp(state.shelter.noise + 0.3, 0, 10);
  state.shelter.threat = clamp(state.shelter.threat + 0.12, 0, 12);
  addResource(state, "food", zoneRewardMultiplier(randInt(2, 3), derived.forageYieldBonus));
  addResource(state, "water", zoneRewardMultiplier(randInt(0, 1), derived.forageYieldBonus * 0.5));
  if (chance(0.18)) {
    addResource(state, "medicine", 1);
  }
  if (chance(0.12)) {
    addResource(state, "cloth", 1);
  }
  if (chance(0.2)) {
    grantItem(state, "canned_beans", 1);
  }
  addLog(state, "You search for food instead of useful things. Today, that is the useful thing.", "loot");
  if (chance(0.55)) {
    runEvent(state, "food");
  }
  evaluateProgression(state);
  return true;
}

function drinkWater(state) {
  if (state.resources.water < 1) {
    return false;
  }

  state.resources.water -= 1;
  state.clocks.thirst = 0;
  state.condition = clamp(state.condition + 4, 0, getDerivedState(state).maxCondition);
  addLog(state, "You drink slowly and let your hands stop shaking.");
  return true;
}

function startWorkJob(state, upgradeId) {
  const upgrade = UPGRADES_BY_ID[upgradeId];
  if (!upgrade || state.upgrades.includes(upgradeId) || getActiveWorkJob(state)) {
    return false;
  }
  if (
    !requirementsMet(state, upgrade.requires)
    || !canAfford(state, upgrade.cost)
    || !hasMaterials(state, upgrade.materials)
    || !hasRequiredTools(state, upgrade.requiredTools)
  ) {
    return false;
  }

  if (!state.work) {
    state.work = { activeJob: null };
  }

  spendResources(state, upgrade.cost);
  spendMaterials(state, upgrade.materials);
  const jobHours = Math.max(1, upgrade.hours || 1);
  state.work.activeJob = {
    kind: workKindForUpgrade(upgrade),
    recipeId: upgrade.id,
    label: upgrade.name,
    tier: upgrade.tier || "field",
    hoursTotal: jobHours,
    hoursRemaining: jobHours,
    requiredTools: [...(upgrade.requiredTools || [])],
    startedAt: getTimeStamp(state),
    completesAt: futureTimeStamp(state, jobHours),
  };
  addLog(
    state,
    `${workCategoryLabel(state.work.activeJob.kind)} started: ${upgrade.name}. ${jobHours}h on the bench. Due ${state.work.activeJob.completesAt}.`,
    state.work.activeJob.kind,
  );
  return true;
}

function buyUpgrade(state, upgradeId) {
  return startWorkJob(state, upgradeId);
}

function enemyBehavior(enemyId) {
  return ENEMIES[enemyId]?.behavior || {};
}

function enemyIntent(enemyId, turn = 1) {
  const behavior = enemyBehavior(enemyId);
  if (enemyId === "stalker" && turn === 1) {
    return "ambush";
  }
  if (!behavior.intents?.length) {
    return behavior.defaultIntent || "lunge";
  }
  return behavior.intents[randInt(0, behavior.intents.length - 1)] || behavior.defaultIntent || "lunge";
}

function combatIntentLabel(intent) {
  switch (intent) {
    case "grapple":
      return "grapple";
    case "shriek":
      return "shriek";
    case "rupture":
      return "rupture";
    case "ambush":
      return "ambush";
    case "feint":
      return "feint";
    case "pulse":
      return "static pulse";
    case "crush":
      return "crush";
    case "lunge":
    default:
      return "lunge";
  }
}

function queueNextCombatIntent(state) {
  if (!state.combat) {
    return;
  }
  state.combat.turn += 1;
  state.combat.intent = enemyIntent(state.combat.enemyId, state.combat.turn);
}

function createCombat(state, enemyId, zoneId, rewards, preview = null) {
  state.combat = {
    enemyId,
    zoneId,
    enemyHp: ENEMIES[enemyId].hp,
    rewards,
    objectiveId: preview?.objective?.id || state.expedition.objective || "salvage",
    turn: 1,
    intent: enemyIntent(enemyId, 1),
    brace: 0,
    grappled: false,
  };
  addLog(
    state,
    `${ENEMIES[enemyId].name} closes in near ${ZONES_BY_ID[zoneId].name}. Intent: ${combatIntentLabel(state.combat.intent)}.`,
    "combat",
  );
}

function scavengeZone(state, zoneId, approachId = state.expedition.approach || "standard") {
  const zone = ZONES_BY_ID[zoneId];
  if (!zone || !state.unlockedZones.includes(zoneId) || state.combat) {
    return false;
  }

  const preview = getExpeditionPreview(state, zoneId, approachId, state.expedition.objective);
  if (!preview || !preview.canLaunch) {
    return false;
  }

  const derived = getDerivedState(state);
  const route = applyRouteEvent(state, preview);
  const adjustedPreview = route.preview;
  spendResources(state, adjustedPreview.cost);
  advanceTime(state, adjustedPreview.hours);
  state.stats.expeditions += 1;
  markZoneVisited(state, zoneId);
  state.shelter.threat = clamp(state.shelter.threat + adjustedPreview.threat, 0, 12);
  state.shelter.noise = clamp(state.shelter.noise + adjustedPreview.noise, 0, 10);
  state.expedition.selectedZone = zoneId;
  state.expedition.approach = adjustedPreview.approach.id;
  state.expedition.objective = adjustedPreview.objective.id;
  addLog(
    state,
    `Route set: ${zone.name} via ${adjustedPreview.approach.label.toLowerCase()} approach on ${adjustedPreview.objective.label.toLowerCase()} objective.`,
    "expedition",
  );
  if (chance(adjustedPreview.approach.travelEventChance)) {
    runEvent(state, `travel:${adjustedPreview.approach.id}`);
  }

  const rewards = generateZoneRewards(zone, derived, adjustedPreview.lootBonus, adjustedPreview.objective);
  const encounterChance = adjustedPreview.encounterChance;
  state.expedition.lastOutcome = {
    zoneId,
    objectiveId: adjustedPreview.objective.id,
    approachId: adjustedPreview.approach.id,
    routeEventId: route.event?.id || null,
    encounterChance: Number(encounterChance.toFixed(2)),
    lootBonus: Number(adjustedPreview.lootBonus.toFixed(2)),
    stamp: getTimeStamp(state),
  };
  if (chance(encounterChance)) {
    createCombat(state, pickOne(zone.enemies), zoneId, rewards, adjustedPreview);
  } else {
    applyZoneRewards(state, zoneId, rewards);
    if (adjustedPreview.objective.id === "signal") {
      resolveRadioMilestones(state, "tower_grid");
      resolveRadioMilestones(state, "anomaly_trace");
    }
    runEvent(state, `zone:${zoneId}`);
  }

  evaluateProgression(state);
  return true;
}

function resolveCombatVictory(state) {
  const enemy = ENEMIES[state.combat.enemyId];
  const zoneId = state.combat.zoneId;
  const behavior = enemyBehavior(enemy.id);
  const derived = getDerivedState(state);
  applyEffectBundle(state, { resources: enemy.reward });
  if (behavior.deathBurst) {
    applyEffectBundle(state, { resources: behavior.deathBurst });
    if (behavior.deathSplash) {
      state.condition = clamp(state.condition - behavior.deathSplash, 0, derived.maxCondition);
      addLog(state, `${enemy.name} ruptures on the way down.`, "combat");
    }
  }
  if (enemy.id === "static_touched") {
    state.radio.traces.anomaly_trace = Number(((state.radio.traces.anomaly_trace || 0) + 0.5).toFixed(2));
  }
  applyZoneRewards(state, zoneId, state.combat.rewards);
  state.stats.combatsWon += 1;
  addLog(state, `${enemy.name} drops hard. The noise it made keeps moving without it.`, "combat");
  if (state.combat.objectiveId === "signal") {
    resolveRadioMilestones(state, "tower_grid");
    resolveRadioMilestones(state, "anomaly_trace");
  }
  runEvent(state, `zone:${zoneId}`);
  state.combat = null;
  evaluateProgression(state);
}

function resolveCombatLoss(state) {
  const lostScrap = Math.min(state.resources.scrap, randInt(4, 10));
  const lostFood = Math.min(state.resources.food, 1);
  state.resources.scrap -= lostScrap;
  state.resources.food -= lostFood;
  state.resources.morale = Math.max(0, state.resources.morale - 2);
  state.condition = 18;
  const wounded = applySurvivorWound(state, 1, ["scout", "guard", "idle"]);
  const stressed = applySurvivorStress(state, 2, ["scout", "guard", "idle"]);
  addLog(state, `You drag yourself home, leaving Scrap ${lostScrap} and Food ${lostFood} behind with the blood.`, "combat");
  if (wounded) {
    addLog(state, `${wounded.name} comes back from the route hurt and slower than before.`, "crew");
  }
  if (stressed) {
    addLog(state, `${stressed.name} cannot stop replaying the route in their head.`, "crew");
  }
  state.combat = null;
}

function combatPlayerDamage(state, derived, enemy) {
  const weapon = ITEMS[state.equipped.weapon];
  let damage = randInt(derived.attack, derived.attack + 3);

  if (state.combat.objectiveId === "sweep") {
    damage += 1;
  }

  if (weapon?.ammoPerAttack) {
    if (state.resources.ammo >= weapon.ammoPerAttack) {
      state.resources.ammo -= weapon.ammoPerAttack;
      damage += 2;
    } else {
      damage = randInt(1, 3);
      addLog(state, `The ${weapon.name} clicks empty. You attack anyway.`, "combat");
    }
  }

  const armor = enemyBehavior(enemy.id).armor || 0;
  return Math.max(1, damage - armor);
}

function resolveEnemyTurn(state, forcedIntent = null) {
  if (!state.combat) {
    return;
  }

  const derived = getDerivedState(state);
  const enemy = ENEMIES[state.combat.enemyId];
  const behavior = enemyBehavior(enemy.id);
  const intent = forcedIntent || state.combat.intent || behavior.defaultIntent || "lunge";
  let incoming = randInt(enemy.attack[0], enemy.attack[1]);
  let summary = `${enemy.name} presses the fight.`;

  switch (intent) {
    case "grapple":
      incoming = Math.max(1, incoming - 1);
      if (chance(behavior.gripChance || 0.25)) {
        state.combat.grappled = true;
        summary = `${enemy.name} hooks onto you and drags the fight close.`;
      } else {
        summary = `${enemy.name} tries to drag you down but misses the hold.`;
      }
      state.shelter.threat = clamp(state.shelter.threat + (behavior.aftermathThreat || 0.18), 0, 12);
      break;
    case "shriek":
      incoming = Math.max(1, incoming - 1);
      state.shelter.threat = clamp(state.shelter.threat + (behavior.shriekThreat || 0.35), 0, 12);
      state.shelter.noise = clamp(state.shelter.noise + (behavior.shriekNoise || 0.4), 0, 10);
      summary = `${enemy.name} shrieks. Everything outside hears it.`;
      break;
    case "rupture":
      incoming += 1;
      summary = `${enemy.name} swells and forces you back through rotten spray.`;
      break;
    case "ambush":
      incoming += randInt(...(behavior.openerBonus || [1, 3]));
      summary = `${enemy.name} comes in from the angle you weren't watching.`;
      break;
    case "feint":
      incoming = Math.max(1, incoming - 2);
      state.combat.grappled = false;
      summary = `${enemy.name} cuts left, tests you, and waits for the wrong move.`;
      break;
    case "pulse":
      state.resources.morale = Math.max(0, state.resources.morale - (behavior.moraleHit || 1));
      state.radio.traces[state.radio.investigation] = Math.max(0, Number(((state.radio.traces[state.radio.investigation] || 0) - (behavior.signalBurn || 0.25)).toFixed(2)));
      summary = `${enemy.name} throws a static pulse through the fight. The receiver in your head hates it.`;
      break;
    case "crush":
      incoming += 2;
      state.shelter.threat = clamp(state.shelter.threat + 0.25, 0, 12);
      summary = `${enemy.name} commits to a brute crush that rattles your whole line.`;
      break;
    case "lunge":
    default:
      summary = `${enemy.name} lunges.`;
      break;
  }

  let reduced = Math.max(1, incoming - Math.floor(derived.defense * 0.75));
  if (state.combat.brace > 0) {
    reduced = Math.max(1, reduced - state.combat.brace);
    state.combat.brace = 0;
  }
  if (state.combat.grappled && intent !== "grapple") {
    reduced += 1;
  }
  reduced = Math.max(0, reduced - Math.floor(derived.nightMitigation * 0.2));
  state.condition = clamp(state.condition - reduced, 0, derived.maxCondition);
  if (reduced >= 4) {
    const wounded = applySurvivorWound(state, 1, ["scout", "guard", "idle"]);
    if (wounded) {
      addLog(state, `${wounded.name} takes a hard knock in the fight.`, "crew");
    }
  } else if (reduced >= 2) {
    const stressed = applySurvivorStress(state, 1, ["scout", "guard", "idle"]);
    if (stressed && chance(0.4)) {
      addLog(state, `${stressed.name} carries the fight back to the shelter in their nerves.`, "crew");
    }
  }
  addLog(state, `${summary} ${reduced > 0 ? `You lose ${reduced} condition.` : "You hold."}`, "combat");

  if (state.condition <= 0) {
    resolveCombatLoss(state);
    return;
  }

  queueNextCombatIntent(state);
}

function attackCombat(state) {
  if (!state.combat) {
    return false;
  }

  const derived = getDerivedState(state);
  const enemy = ENEMIES[state.combat.enemyId];
  const damage = combatPlayerDamage(state, derived, enemy);

  state.combat.enemyHp = Math.max(0, state.combat.enemyHp - damage);
  if (state.combat.enemyHp <= 0) {
    addLog(state, `You hit ${enemy.name} for ${damage}.`, "combat");
    resolveCombatVictory(state);
    return true;
  }

  addLog(state, `You hit ${enemy.name} for ${damage}. ${enemy.name} lines up ${combatIntentLabel(state.combat.intent)}.`, "combat");
  resolveEnemyTurn(state);
  return true;
}

function braceCombat(state) {
  if (!state.combat) {
    return false;
  }

  state.combat.brace = 3;
  addLog(state, `You brace for ${combatIntentLabel(state.combat.intent)}.`, "combat");
  resolveEnemyTurn(state);
  return true;
}

function retreatCombat(state) {
  if (!state.combat) {
    return false;
  }

  const derived = getDerivedState(state);
  const zoneRisk = ZONES_BY_ID[state.combat.zoneId].risk;
  const behavior = enemyBehavior(state.combat.enemyId);
  const escapeChance = clamp(
    0.45
      + derived.scoutBonus
      - zoneRisk * 0.04
      - (behavior.retreatPenalty || 0)
      - (state.combat.grappled ? behavior.gripPenalty || 0.12 : 0),
    0.15,
    0.8,
  );
  if (chance(escapeChance)) {
    addLog(state, `You break line of sight and lose the ${ENEMIES[state.combat.enemyId].name} in the dark.`, "combat");
    if (state.combat.enemyId === "screecher") {
      state.shelter.threat = clamp(state.shelter.threat + 0.35, 0, 12);
      state.shelter.noise = clamp(state.shelter.noise + 0.5, 0, 10);
    }
    state.combat = null;
    return true;
  }

  addLog(state, `You almost get away. ${ENEMIES[state.combat.enemyId].name} punishes the break.`, "combat");
  resolveEnemyTurn(state, state.combat.intent === "feint" ? "ambush" : state.combat.intent);
  return true;
}

function equipItem(state, itemId) {
  const item = ITEMS[itemId];
  if (!item || !hasItem(state, itemId)) {
    return false;
  }

  if (item.type === "weapon") {
    state.equipped.weapon = itemId;
    addLog(state, `Equipped: ${item.name}.`, "build");
    return true;
  }
  if (item.type === "armor") {
    state.equipped.armor = itemId;
    addLog(state, `Equipped: ${item.name}.`, "build");
    return true;
  }
  if (item.type === "backpack") {
    state.equipped.backpack = itemId;
    addLog(state, `Packed: ${item.name}.`, "build");
    return true;
  }

  return false;
}

function useItem(state, itemId) {
  const item = ITEMS[itemId];
  if (!item || !hasItem(state, itemId) || item.type !== "consumable") {
    return false;
  }

  state.inventory[itemId] -= 1;
  if (state.inventory[itemId] <= 0) {
    delete state.inventory[itemId];
  }

  if (item.heal) {
    state.condition = clamp(state.condition + item.heal, 0, getDerivedState(state).maxCondition);
  }
  if (item.resources) {
    Object.entries(item.resources).forEach(([resourceId, amount]) => addResource(state, resourceId, amount));
  }
  if (item.condition) {
    state.condition = clamp(state.condition + item.condition, 0, getDerivedState(state).maxCondition);
  }

  addLog(state, `Used: ${item.name}.`, "loot");
  evaluateProgression(state);
  return true;
}

function useBestMedicalItem(state) {
  if (hasItem(state, "bandage_roll")) {
    return useItem(state, "bandage_roll");
  }
  if (hasItem(state, "first_aid_rag")) {
    return useItem(state, "first_aid_rag");
  }
  return false;
}

function eatRation(state) {
  if (state.resources.food < 1) {
    return false;
  }

  state.resources.food -= 1;
  state.clocks.hunger = 0;
  state.condition = clamp(state.condition + 6, 0, getDerivedState(state).maxCondition);
  addResource(state, "morale", 1);
  addLog(state, "You eat while the shelter creaks around you.", "loot");
  return true;
}

function patchBarricade(state) {
  if (state.resources.scrap < 6 || state.resources.wood < 2) {
    return false;
  }

  state.resources.scrap -= 6;
  state.resources.wood -= 2;
  state.shelter.threat = clamp(state.shelter.threat - (hasItem(state, "salvage_hatchet") ? 1.9 : 1.5), 0, 12);
  state.shelter.warmth = clamp(state.shelter.warmth + 0.6, 0, 10);
  state.shelter.noise = clamp(state.shelter.noise + 0.18, 0, 10);
  if (hasUpgrade(state, "basic_barricade")) {
    setStructureDamage(state, "basic_barricade", getStructureDamage(state, "basic_barricade") - (hasItem(state, "salvage_hatchet") ? 2 : 1));
  }
  addLog(state, `You patch weak seams with wood, scrap, and stubbornness${hasItem(state, "salvage_hatchet") ? ", using the hatchet to bite the joins clean" : ""}.`, "build");
  return true;
}

function craftAmmo(state) {
  if (
    !hasUpgrade(state, "ammo_press")
    || state.resources.parts < 1
    || state.resources.scrap < 1
    || state.resources.chemicals < 1
  ) {
    return false;
  }

  state.resources.parts -= 1;
  state.resources.scrap -= 1;
  state.resources.chemicals -= 1;
  addResource(state, "ammo", 5);
  addLog(state, "You press a handful of ugly rounds that should still work.", "build");
  return true;
}

function recruitSurvivor(state) {
  const derived = getDerivedState(state);
  if (state.survivors.total >= derived.survivorCap) {
    return false;
  }
  if (!canAfford(state, { scrap: 22, wood: 1, food: 4, water: 2 })) {
    return false;
  }

  spendResources(state, { scrap: 22, wood: 1, food: 4, water: 2 });
  syncSurvivorRoster(state);
  const index = state.survivors.roster.length;
  const traitId = SURVIVOR_TRAIT_IDS[randInt(0, SURVIVOR_TRAIT_IDS.length - 1)];
  state.survivors.roster.push(normalizeSurvivorRecord({
    id: `survivor-${Date.now()}-${index}`,
    name: survivorName(index + randInt(0, SURVIVOR_NAME_POOL.length - 1)),
    traitId,
    role: "idle",
  }, index));
  syncSurvivorRoster(state);
  addResource(state, "morale", 1);
  const recruit = state.survivors.roster[state.survivors.roster.length - 1];
  addLog(state, `${recruit.name} agrees to stay. Trait: ${SURVIVOR_TRAITS[recruit.traitId].label}.`, "crew");
  return true;
}

function adjustSurvivorRole(state, roleId, delta) {
  if (!SURVIVOR_ROLES[roleId]) {
    return false;
  }
  syncSurvivorRoster(state);
  if (delta > 0) {
    const survivor = idleSurvivor(state);
    if (!survivor) {
      return false;
    }
    survivor.role = roleId;
  } else {
    const survivor = assignedSurvivor(state, roleId);
    if (!survivor) {
      return false;
    }
    survivor.role = "idle";
  }
  syncSurvivorRoster(state);
  return true;
}

function getAvailableRadioInvestigations(state) {
  return RADIO_INVESTIGATIONS.filter((investigation) => {
    if (investigation.id === "tower_grid" && !state.unlockedSections.includes("radio")) {
      return false;
    }
    if (investigation.id === "sublevel_echo" && state.story.radioProgress < 1 && !hasItem(state, "relay_key")) {
      return false;
    }
    if (investigation.id === "anomaly_trace" && state.story.radioProgress < 2 && !state.flags.bunkerRouteKnown) {
      return false;
    }
    return true;
  });
}

function workKindForUpgrade(upgrade) {
  return upgrade.category === "build" ? "build" : "craft";
}

function workCategoryLabel(kind) {
  return kind === "build" ? "Base Build" : "Craft";
}

function workResultLabel(upgrade) {
  if (upgrade.resultLabel) {
    return upgrade.resultLabel;
  }
  const grantedItems = Object.keys(upgrade.effects?.grantItems || {});
  if (grantedItems.length) {
    return ITEMS[grantedItems[0]]?.name || grantedItems[0];
  }
  const zoneId = upgrade.effects?.unlockZones?.[0];
  if (zoneId && ZONES_BY_ID[zoneId]) {
    return ZONES_BY_ID[zoneId].name;
  }
  const sectionId = upgrade.effects?.unlockSections?.[0];
  if (sectionId) {
    return sectionId;
  }
  return upgrade.name;
}

function applyCompletedUpgrade(state, upgrade) {
  if (!state.upgrades.includes(upgrade.id)) {
    state.upgrades.push(upgrade.id);
  }
  applyEffectBundle(state, upgrade.effects);
  addLog(
    state,
    `${workCategoryLabel(workKindForUpgrade(upgrade))} complete: ${upgrade.name}. ${workResultLabel(upgrade)} is now live.`,
    workKindForUpgrade(upgrade),
  );
  evaluateProgression(state);
}

function finishActiveJob(state) {
  const job = getActiveWorkJob(state);
  if (!job) {
    return false;
  }

  const upgrade = UPGRADES_BY_ID[job.recipeId];
  state.work.activeJob = null;
  if (!upgrade) {
    return false;
  }

  applyCompletedUpgrade(state, upgrade);
  return true;
}

function tickActiveJob(state) {
  const job = getActiveWorkJob(state);
  if (!job) {
    return false;
  }

  job.hoursRemaining = Math.max(0, job.hoursRemaining - 1);
  if (job.hoursRemaining <= 0) {
    return finishActiveJob(state);
  }
  return true;
}

function setRadioInvestigation(state, investigationId) {
  if (!RADIO_INVESTIGATIONS_BY_ID[investigationId] || state.radio.investigation === investigationId) {
    return false;
  }

  state.radio.investigation = investigationId;
  addLog(state, `Receiver target set: ${RADIO_INVESTIGATIONS_BY_ID[investigationId].label}.`, "radio");
  return true;
}

function radioMilestoneReady(state, investigationId, milestone) {
  if (state.radio.resolved.includes(milestone.id)) {
    return false;
  }
  if ((state.radio.traces[investigationId] || 0) < milestone.at) {
    return false;
  }
  if (milestone.id === "anomaly_dead_static" && !hasItem(state, "bunker_pass")) {
    return false;
  }
  return true;
}

function resolveRadioMilestones(state, investigationId) {
  const investigation = radioInvestigation(investigationId);
  investigation.milestones.forEach((milestone) => {
    if (!radioMilestoneReady(state, investigationId, milestone)) {
      return;
    }

    state.radio.resolved.push(milestone.id);
    applyEffectBundle(state, milestone.effects);
    addLog(state, milestone.text, "radio");
  });

  if (
    investigationId === "anomaly_trace"
    && (state.radio.traces.anomaly_trace || 0) >= 5
    && hasItem(state, "bunker_pass")
    && !state.flags.worldReveal
  ) {
    state.flags.worldReveal = true;
    state.story.radioProgress += 1;
    state.story.secretProgress += 1;
    addLog(state, "The anomaly trace resolves against bunker records. Dead Static was infrastructure wearing the face of an outbreak.", "radio");
  }
}

function getRadioBoard(state) {
  return getAvailableRadioInvestigations(state).map((investigation) => {
    const trace = state.radio.traces[investigation.id] || 0;
    const resolved = investigation.milestones.filter((milestone) => state.radio.resolved.includes(milestone.id));
    const next = investigation.milestones.find((milestone) => !state.radio.resolved.includes(milestone.id)) || null;
    return {
      id: investigation.id,
      label: investigation.label,
      short: investigation.short,
      trace,
      resolvedCount: resolved.length,
      totalMilestones: investigation.milestones.length,
      nextAt: next?.at || null,
      nextText: next?.text || "Track exhausted.",
      active: state.radio.investigation === investigation.id,
    };
  });
}

function scanRadio(state) {
  if (!canAfford(state, { fuel: 1, parts: 1 })) {
    return false;
  }

  const derived = getDerivedState(state);
  const systems = getShelterSystems(state, derived);
  const investigation = radioInvestigation(state.radio.investigation);
  const faction = factionConsequences(state);
  spendResources(state, { fuel: 1, parts: 1 });
  advanceTime(state, 1);
  state.stats.radioScans += 1;
  let traceGain = 1 + derived.signalGain + derived.radioDepth * 0.24 + systems.coverage * 0.06 - systems.powerGap * 0.16;
  if (investigation.id === "anomaly_trace") {
    traceGain += derived.anomalyGain;
    traceGain -= faction.anomalyPenalty || 0;
  }
  if (faction.objectiveBias?.signal && investigation.id === "tower_grid") {
    traceGain += faction.objectiveBias.signal;
  }
  if (systems.maintenanceState === "failing") {
    traceGain -= 0.18;
  }

  state.radio.traces[investigation.id] = Number(((state.radio.traces[investigation.id] || 0) + Math.max(0.5, traceGain)).toFixed(2));
  state.radio.lastSweep = {
    investigationId: investigation.id,
    gain: Number(Math.max(0.5, traceGain).toFixed(2)),
    stamp: getTimeStamp(state),
  };
  addLog(
    state,
    `You work ${investigation.label.toLowerCase()}. ${investigation.traceLabel} +${state.radio.lastSweep.gain}.${systems.powerState !== "stable" ? ` The line is running ${systems.powerState}.` : ""}`,
    "radio",
  );
  runEvent(state, `radio:${investigation.id}`);
  resolveRadioMilestones(state, investigation.id);
  evaluateProgression(state);
  return true;
}

function discountedCost(cost = {}, discount = 0) {
  const adjusted = {};
  Object.entries(cost).forEach(([resourceId, amount]) => {
    adjusted[resourceId] = resourceId === "relics"
      ? amount
      : Math.max(1, Math.round(amount * (1 - discount)));
  });
  return adjusted;
}

function offerAvailable(state, offer, channelId) {
  if (offer.cost.relics && state.story.radioProgress < 2) {
    return false;
  }
  if (offer.id === "rifle_cache" && !state.unlockedSections.includes("trader")) {
    return false;
  }
  if (channelId && offer.channels && !offer.channels.includes(channelId)) {
    return false;
  }
  return true;
}

function requestTraderChannel(state, channelId = state.trader.channel || "open_market") {
  const channel = TRADER_CHANNELS_BY_ID[channelId];
  if (!channelAvailable(state, channel)) {
    return false;
  }

  state.trader.channel = channelId;
  state.trader.offers = TRADER_OFFERS
    .filter((offer) => offerAvailable(state, offer, channelId))
    .map((offer) => offer.id);
  state.trader.lastContact = {
    channelId,
    stamp: getTimeStamp(state),
  };
  state.stats.traderRefreshes += 1;
  addLog(state, `${channel.name} answers. Prices arrive clean and personal.`, "trade");
  return true;
}

function refreshTraderOffers(state) {
  return requestTraderChannel(state, state.trader.channel || "open_market");
}

function getTraderOfferCost(state, offer) {
  return discountedCost(offer.cost, getDerivedState(state).traderDiscount);
}

function buyTraderOffer(state, offerId) {
  const offer = TRADER_OFFERS.find((candidate) => candidate.id === offerId);
  const adjustedCost = discountedCost(offer?.cost || {}, getDerivedState(state).traderDiscount);
  if (!offer || !state.trader.offers.includes(offerId) || !canAfford(state, adjustedCost)) {
    return false;
  }

  spendResources(state, adjustedCost);
  applyEffectBundle(state, offer.reward);
  Object.keys(offer.reward.radioTrace || {}).forEach((traceId) => resolveRadioMilestones(state, traceId));
  state.trader.offers = state.trader.offers.filter((id) => id !== offerId);
  addLog(state, `Trade made: ${offer.name}.`, "trade");
  evaluateProgression(state);
  return true;
}

function chooseFaction(state, factionId) {
  if (state.faction.aligned || !FACTIONS_BY_ID[factionId]) {
    return false;
  }

  state.faction.aligned = factionId;
  addResource(state, "reputation", 4);
  addLog(state, `You align with ${FACTIONS_BY_ID[factionId].name}. The city starts answering differently.`, "radio");
  const channelId = FACTIONS_BY_ID[factionId]?.consequences?.tradeChannel;
  if (channelId) {
    requestTraderChannel(state, channelId);
  }
  return true;
}

function processRealtimeTick(state, seconds = 1) {
  const derived = getDerivedState(state);
  let changed = false;

  RESOURCE_ORDER.forEach((resourceId) => {
    const rate = derived.passive[resourceId];
    if (rate <= 0) {
      return;
    }
    state.buffers.resources[resourceId] += rate * seconds;
    const whole = Math.floor(state.buffers.resources[resourceId]);
    if (whole > 0) {
      state.buffers.resources[resourceId] -= whole;
      addResource(state, resourceId, whole);
      changed = true;
    }
  });

  if (derived.conditionRegen > 0 && state.condition < derived.maxCondition) {
    state.buffers.condition += derived.conditionRegen * seconds;
    const whole = Math.floor(state.buffers.condition);
    if (whole > 0) {
      state.buffers.condition -= whole;
      state.condition = clamp(state.condition + whole, 0, derived.maxCondition);
      changed = true;
    }
  }

  if (changed) {
    evaluateProgression(state);
  }

  return changed;
}

function byId(id) {
  return document.getElementById(id);
}

function isMobileViewport() {
  return typeof window !== "undefined" && Number(window.innerWidth || 0) <= 720;
}

function escapeAttribute(value = "") {
  return String(value)
    .replace(/&/g, "&amp;")
    .replace(/"/g, "&quot;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;");
}

function tooltipPayload(value) {
  if (!value) {
    return { title: "", meta: "", body: "" };
  }
  if (typeof value === "string") {
    return { title: "", meta: "", body: value };
  }
  return {
    title: value.title || "",
    meta: value.meta || "",
    body: value.body || value.text || "",
  };
}

function tooltipAttrs(value) {
  const payload = tooltipPayload(value);
  if (!payload.title && !payload.body && !payload.meta) {
    return "";
  }
  const fallback = [payload.title, payload.body].filter(Boolean).join(" — ");
  return ` data-tooltip="true" data-tooltip-title="${escapeAttribute(payload.title)}" data-tooltip-meta="${escapeAttribute(payload.meta)}" data-tooltip-body="${escapeAttribute(payload.body)}" title="${escapeAttribute(fallback)}"`;
}

function resourceDef(resourceId) {
  return RESOURCE_DEFS[resourceId] || { label: resourceId.replace(/_/g, " "), icon: resourceId };
}

function resourceLabel(resourceId) {
  return resourceDef(resourceId).label;
}

function itemLabel(itemId) {
  return ITEMS[itemId]?.name || itemId.replace(/_/g, " ");
}

function tabVisible(state, tab) {
  if (!tab.unlock) {
    return true;
  }
  return state.unlockedSections.includes(tab.unlock);
}

function ensureActiveTab(state) {
  const tabs = TAB_DEFS.filter((tab) => tabVisible(state, tab));
  if (!tabs.some((tab) => tab.id === state.ui.activeTab)) {
    state.ui.activeTab = tabs[0]?.id || "ops";
  }
  return tabs;
}

function surfaceCard({ title = "", meta = "", body = "", className = "" }) {
  return `
    <section class="surface-card ${className}">
      ${(title || meta)
        ? `
          <header class="surface-head">
            <div>
              ${title ? `<h3>${title}</h3>` : ""}
            </div>
            ${meta ? `<span class="tag">${meta}</span>` : ""}
          </header>
        `
        : ""}
      <div class="surface-body">${body}</div>
    </section>
  `;
}

function actionButton({
  action,
  label,
  meta = "",
  disabled = false,
  variant = "",
  data = {},
  icon = "",
  tooltip = "",
}) {
  const attrs = Object.entries(data)
    .map(([key, value]) => `data-${key}="${escapeAttribute(value)}"`)
    .join(" ");
  const iconMarkupText = icon ? `<span class="button-icon">${iconMarkup(icon)}</span>` : "";
  return `
    <button
      type="button"
      class="action-button ${variant}"
      data-action="${action}"
      ${attrs}
      ${disabled ? "disabled" : ""}
      ${tooltipAttrs(tooltip)}
    >
      ${iconMarkupText}
      <span class="button-copy">
        <strong>${label}</strong>
        ${meta ? `<small>${meta}</small>` : ""}
      </span>
    </button>
  `;
}

function tagList(values = []) {
  return values
    .filter(Boolean)
    .map((value) => `<span class="chip">${value}</span>`)
    .join("");
}

function renderSplitPane(leftColumn = [], rightColumn = []) {
  return `
    <div class="split-pane">
      <div class="split-column">${leftColumn.join("")}</div>
      <div class="split-column">${rightColumn.join("")}</div>
    </div>
  `;
}

function countMarkup(tab, state) {
  if (!tab.count) {
    return "";
  }
  const count = tab.count(state);
  if (!count) {
    return "";
  }
  return `<span class="tab-count">${count}</span>`;
}

function resourcePillMarkup(state, resourceId, compact = false) {
  const def = resourceDef(resourceId);
  const value = state.resources?.[resourceId] || 0;
  const tooltip = {
    title: def.label,
    meta: "resource",
    body: `${def.label} in reserve: ${value}.`,
  };
  return `
    <button type="button" class="resource-pill ${compact ? "is-compact" : ""}" ${tooltipAttrs(tooltip)}>
      <span class="resource-pill-key">
        <span class="resource-icon">${iconMarkup(def.icon || "generic")}</span>
        <span>${def.label}</span>
      </span>
      <strong>${value}</strong>
    </button>
  `;
}

function sortedDiscoveredResources(state) {
  const known = new Set(state.discoveredResources || []);
  return RESOURCE_ORDER.filter((resourceId) => known.has(resourceId));
}

function conditionClass(percent) {
  if (percent <= 24) return "danger";
  if (percent <= 50) return "warn";
  return "good";
}

function renderSubtitle(state) {
  const subtitle = byId("world-subtitle");
  if (!subtitle) {
    return;
  }
  if (state.story.secretProgress >= 3) {
    subtitle.textContent = "The shelter is holding. The signal is getting closer.";
    return;
  }
  if (state.story.radioProgress >= 2) {
    subtitle.textContent = "Static now sounds like intent, not noise.";
    return;
  }
  subtitle.textContent = "Hold the room. Keep the fire alive. Listen when the wires start talking.";
}

function renderResourceBar(state, isMobile = false) {
  const resourceBar = byId("resource-bar");
  if (!resourceBar) {
    return;
  }
  const ids = sortedDiscoveredResources(state).slice(0, isMobile ? 4 : 8);
  resourceBar.innerHTML = ids.map((resourceId) => resourcePillMarkup(state, resourceId, isMobile)).join("");
}

function renderCondition(state, derived) {
  const percent = Math.max(0, Math.min(100, Math.round((state.condition / derived.maxCondition) * 100)));
  const readout = byId("condition-readout");
  const meter = byId("condition-bar");
  if (!readout || !meter) {
    return;
  }
  readout.textContent = `Condition ${state.condition}/${derived.maxCondition}`;
  meter.innerHTML = `<div class="meter-fill ${conditionClass(percent)}" style="width:${percent}%"></div>`;
}

function summaryTile(label, value, tooltip = "") {
  return `
    <div class="summary-pill"${tooltipAttrs(tooltip)}>
      <div class="summary-pill-top">
        <span>${label}</span>
        <strong>${value}</strong>
      </div>
    </div>
  `;
}

function renderSummaryStrip(state, derived) {
  const strip = byId("summary-strip");
  if (!strip) {
    return;
  }
  const upkeep = getShelterUpkeep(state);
  const systems = getShelterSystems(state, derived);
  const activeJob = getActiveWorkJob(state);
  const forecast = getNightForecast(state);
  strip.innerHTML = [
    summaryTile("Warmth", state.shelter.warmth.toFixed(1), { title: "Warmth", meta: "shelter", body: "Low warmth drags condition and weakens the shelter through long nights." }),
    summaryTile("Threat", state.shelter.threat.toFixed(1), { title: "Threat", meta: "pressure", body: "Threat grows from noise, time, poor defenses, and bad nights." }),
    summaryTile("Noise", state.shelter.noise.toFixed(1), { title: "Noise", meta: "pressure", body: "Noise invites infected attention and raises bad-contact risk." }),
    summaryTile("Meal", `${upkeep.mealHoursLeft}h`, { title: "Meal due", meta: "upkeep", body: `Crew eats ${upkeep.mealCost} food every ${upkeep.mealHours}h.` }),
    summaryTile("Water", `${upkeep.waterHoursLeft}h`, { title: "Water due", meta: "upkeep", body: `Crew drinks ${upkeep.waterCost} water every ${upkeep.waterHours}h.` }),
    summaryTile("Queue", activeJob ? `${activeJob.hoursRemaining}h` : "idle", { title: "Active work", meta: activeJob ? activeJob.kind : "queue", body: activeJob ? `${activeJob.label} completes at ${activeJob.completesAt}.` : "No active build or craft job." }),
    summaryTile("Night", forecast.siege ? "siege" : forecast.breachChance > 0.42 ? "hard" : "watch", { title: "Night forecast", meta: "forecast", body: `Danger ${forecast.dangerScore.toFixed(1)}. Breach ${(forecast.breachChance * 100).toFixed(0)}%. Siege ${forecast.siege ? "possible" : "unlikely"}.` }),
    summaryTile("Power", `${systems.powerSupply}/${systems.powerDemand || 0}`, { title: "Shelter power", meta: systems.powerState, body: `Power ${systems.powerSupply} vs demand ${systems.powerDemand}. ${systems.powerState}.` }),
  ].join("");
}

function renderMobileSurvivalStrip(state, derived) {
  const mobileStrip = byId("mobile-survival-strip");
  if (!mobileStrip) {
    return;
  }
  const percent = Math.max(0, Math.min(100, Math.round((state.condition / derived.maxCondition) * 100)));
  const resourceIds = sortedDiscoveredResources(state);
  const topResources = resourceIds.slice(0, 4);
  const overflowCount = Math.max(0, resourceIds.length - topResources.length);
  mobileStrip.innerHTML = `
    <div class="mobile-survival-head">
      <span class="mobile-condition-label">Condition</span>
      <strong>${state.condition}/${derived.maxCondition}</strong>
    </div>
    <div class="mobile-condition-meter">
      <div class="meter-fill ${conditionClass(percent)}" style="width:${percent}%"></div>
    </div>
    <div class="mobile-resource-row">
      ${topResources.map((resourceId) => resourcePillMarkup(state, resourceId, true)).join("")}
      ${overflowCount
        ? `
          <button type="button" class="resource-pill resource-pill-overflow" data-action="toggle-mobile-resource-drawer">
            <span class="resource-pill-key"><span>More</span></span>
            <strong>+${overflowCount}</strong>
          </button>

        : ""}
    </div>
  `;
}

function renderTabBar(state, tabs) {

    .map((tab) => `

              <span>${tab.label}</span>
            </button>

function renderTutorialBanner(state) {
  if (!state.settings.tutorialHints) {
    return "";
  }
  const hints = [];
  if (!state.player.username) {
    hints.push("Set Username");
  }
  if ((state.stats.searches || 0) < 4) {
    hints.push("Search rubble");
  }
  if (!state.upgrades.includes("campfire")) {
    hints.push("Build heat");
  }
  if (!hints.length) {
    return "";
  }
  return `
    <section class="tutorial-strip ${isMobileViewport() ? "tutorial-strip-mobile" : ""}">
      <div class="tutorial-copy">
        <span class="note-label">Guide</span>
        <strong>New player guide</strong>
        <span>${hints.join(" / ")}</span>
      </div>
      <div class="tutorial-actions">
        ${!state.player.username ? actionButton({ action: "set-username", label: "Set Username", icon: "username", variant: "compact" }) : ""}
        ${actionButton({ action: "skip-tutorial", label: "Skip", icon: "retreat", variant: "compact" })}
      </div>
    </section>
  `;
}

function renderMiniLog(state, limit = 5) {
  const entries = state.log.slice(0, limit);
  return `
    <div class="mini-log">
      ${entries.map((entry) => `
        <div class="mini-log-line">
          <span>${entry.stamp}</span>
          <p>${entry.text}</p>
        </div>
      `).join("")}
    </div>
  `;
}

function itemPrimaryLine(item, amount) {
  if (!item) {
    return "";
  }
  const parts = [];
  if (item.attack) parts.push(`atk ${item.attack}`);
  if (item.defense) parts.push(`def ${item.defense}`);
  if (item.heal) parts.push(`heal ${item.heal}`);
  if (item.backpackSlots) parts.push(`carry +${item.backpackSlots}`);
  if (item.toolRole) parts.push(item.toolRole.replace(/_/g, " "));
  if (item.resources) {
    Object.entries(item.resources).forEach(([resourceId, value]) => {
      parts.push(`${resourceLabel(resourceId)} +${value}`);
    });
  }
  if (!parts.length && amount > 1) {
    parts.push(`x${amount}`);
  }
  return parts.join(" / ");
}

function itemTooltipText(item, amount) {
  const lines = [item.name, `Type: ${item.type}`];
  const primary = itemPrimaryLine(item, amount);
  if (primary) {
    lines.push(primary);
  }
  if (item.description) {
    lines.push(item.description);
  }
  return lines.join(" • ");
}

function renderInventoryItemCard(itemId, amount, options = {}) {
  const item = ITEMS[itemId];
  if (!item) {
    return "";
  }
  const tooltip = {
    title: item.name,
    meta: item.type,
    body: itemTooltipText(item, amount),
  };
  let actionMarkup = "";
  if (options.showAction !== false) {
    if (item.type === "weapon" || item.type === "armor" || item.type === "backpack") {
      actionMarkup = actionButton({
        action: "equip-item",
        label: "Equip",
        icon: "gear",
        variant: "compact",
        data: { item: itemId },
        tooltip,
      });
    } else if (item.type === "consumable") {
      actionMarkup = actionButton({
        action: "use-item",
        label: "Use",
        icon: "use",
        variant: "compact",
        data: { item: itemId },
        tooltip,
      });
    }
  }

  return `
    <div class="inventory-sprite-card"${tooltipAttrs(tooltip)}>
      <div class="inventory-sprite-top">
        <span class="inventory-sprite-wrap">${renderItemSprite(itemId, item, options.large ? 40 : 24)}</span>
        <span class="inventory-amount">${amount}</span>
      </div>
      <div class="inventory-sprite-copy">
        <strong>${item.name}</strong>
        <small>${itemPrimaryLine(item, amount) || item.type}</small>
      </div>
      ${actionMarkup}
    </div>
  `;
}


// render/stage.js
function stageMeta(state, derived) {
  const activeJob = getActiveWorkJob(state);

  switch (state.ui.activeTab) {
    case "survivor":
      return {
        eyebrow: "Field profile",
        title: state.player.username || "Unnamed Survivor",
        detail: "Loadout, carried kit, and combat condition.",

  return `

          <span class="note-label">${meta.eyebrow}</span>

            <div class="stage-stat">

            </div>
          `).join("")}

const SHELTER_STRUCTURE_DEFS = [
  ...SHELTER_FIXED_STRUCTURES,
  ...SHELTER_PLACEABLE_STRUCTURES,
];

const STRUCTURES_BY_ID = Object.fromEntries(
  SHELTER_STRUCTURE_DEFS.map((structure) => [structure.id, structure]),
);

function shelterStructureById(id) {
  return STRUCTURES_BY_ID[id] || null;
}

function isStructureBuilt(upgrades, structure) {
  if (structure.id === "shelter_core") {
    return true;
  }
  return !structure.upgradeId || upgrades.includes(structure.upgradeId);
}

function builtShelterStructures(upgrades) {
  return SHELTER_STRUCTURE_DEFS.filter((structure) => isStructureBuilt(upgrades, structure));
}

function builtPlaceableStructures(upgrades) {
  return SHELTER_PLACEABLE_STRUCTURES.filter((structure) => isStructureBuilt(upgrades, structure));
}

function structureArea(structure, position = structure.defaultPosition) {
  const [width, height] = structure.footprint;
  return {
    x1: position.x,
    y1: position.y,
    x2: position.x + width - 1,
    y2: position.y + height - 1,
  };
}

function areasOverlap(left, right) {
  return !(left.x2 < right.x1 || left.x1 > right.x2 || left.y2 < right.y1 || left.y1 > right.y2);
}

function canPlaceShelterStructure(placed, structureId, x, y, builtIds) {
  const structure = shelterStructureById(structureId);
  if (!structure || !structure.placeable || !builtIds.includes(structureId)) {
    return false;
  }
  const area = structureArea(structure, { x, y });
  if (
    area.x1 < 1
    || area.y1 < 1
    || area.x2 > SHELTER_GRID_COLUMNS
    || area.y2 > SHELTER_GRID_ROWS
  ) {
    return false;
  }

  const fixedCore = shelterStructureById("shelter_core");
  const coreArea = structureArea(fixedCore);
  if (areasOverlap(area, coreArea)) {
    return false;
  }

  return builtIds.every((otherId) => {
    if (otherId === structureId) {
      return true;
    }
    const other = shelterStructureById(otherId);
    if (!other || !other.placeable) {
      return true;
    }
    const position = placed[otherId];
    if (!position) {
      return true;
    }
    return !areasOverlap(area, structureArea(other, position));
  });
}

function seedShelterPlacedLayout(upgrades, existingPlaced = {}) {
  const builtIds = builtPlaceableStructures(upgrades).map((structure) => structure.id);
  const placed = {};

  builtIds.forEach((structureId) => {
    const structure = shelterStructureById(structureId);
    const current = existingPlaced[structureId];
    if (current && canPlaceShelterStructure({ ...placed, [structureId]: current }, structureId, current.x, current.y, builtIds)) {
      placed[structureId] = { x: current.x, y: current.y };
      return;
    }

    const fallback = structure.defaultPosition;
    if (canPlaceShelterStructure({ ...placed, [structureId]: fallback }, structureId, fallback.x, fallback.y, builtIds)) {
      placed[structureId] = { x: fallback.x, y: fallback.y };
    }
  });

  return placed;
}

function structureUpgradeId(structureId) {
  return shelterStructureById(structureId)?.upgradeId || null;
}


// render/shelter-map.js
function builtStructureDefs(state) {
  const builtIds = builtPlaceableStructures(state.upgrades).map((structure) => structure.id);
  return {
    builtIds,
    structures: SHELTER_PLACEABLE_STRUCTURES.filter((structure) => builtIds.includes(structure.id)),
  };
}

function outpostStage(count) {
  if (count <= 3) return "Held Corner";
  if (count <= 7) return "Shelter Line";
  if (count <= 12) return "Working Outpost";
  return "Fortified Base";
}

function structureEffects(structureId) {
  const upgrade = UPGRADES_BY_ID[structureUpgradeId(structureId)];
  const chips = [];
  if (!upgrade?.effects) {
    return chips;
  }
  const { effects } = upgrade;
  if (effects.burnCondition) chips.push(`heat +${effects.burnCondition}`);
  if (effects.nightMitigation) chips.push(`night resist +${Math.round(effects.nightMitigation * 100)}%`);
  if (effects.power) chips.push(`power +${effects.power}`);
  if (effects.coverage) chips.push(`coverage +${effects.coverage}`);
  if (effects.foodSecurity) chips.push(`food +${effects.foodSecurity}`);
  if (effects.waterSecurity) chips.push(`water +${effects.waterSecurity}`);
  if (effects.maintenance) chips.push(`maintenance +${effects.maintenance}`);
  if (effects.repairPower) chips.push(`repairs +${effects.repairPower}`);
  if (effects.siegeMitigation) chips.push(`siege resist +${Math.round(effects.siegeMitigation * 100)}%`);
  if (effects.unlockSections?.length) chips.push(`opens ${effects.unlockSections.join(", ")}`);
  if (effects.grantItems) {
    Object.entries(effects.grantItems).forEach(([itemId, amount]) => chips.push(`${itemLabel(itemId)} x${amount}`));
  }
  return chips;
}

function structureStatus(structureId, state) {
  const damage = getStructureDamage(state, structureId);
  const placed = state.shelter.layout?.placed?.[structureId];
  if (damage >= 2) {
    return { label: "damaged", tone: "danger", detail: "Needs repair before the next hard night." };
  }
  if (damage === 1) {
    return { label: "strained", tone: "warn", detail: "Holding, but starting to slip." };
  }
  if (!placed && structureId !== "shelter_core" && structureId !== "perimeter_fence") {
    return { label: "unplaced", tone: "idle", detail: "Built, but not placed on the board yet." };
  }
  return { label: "stable", tone: "good", detail: "Operational." };
}

function structureTooltip(structure, state) {
  const status = structureStatus(structure.id, state);
  return {
    title: structure.label,
    meta: status.label,
    body: `${structure.detail} ${status.detail}`,
  };
}

function renderBoardTiles(state, builtIds, pendingId) {
  const tiles = [];
  for (let row = 1; row <= SHELTER_GRID_ROWS; row += 1) {
    for (let col = 1; col <= SHELTER_GRID_COLUMNS; col += 1) {
      const valid = pendingId
        ? canPlaceShelterStructure(state.shelter.layout?.placed || {}, pendingId, col, row, builtIds)
        : false;
      tiles.push(`
        <button
          type="button"
          class="base-tile ${pendingId ? "is-placement" : ""} ${valid ? "is-valid" : ""}"
          ${pendingId ? `data-action="place-structure" data-structure="${pendingId}" data-x="${col}" data-y="${row}" ${valid ? "" : "disabled"}` : "disabled"}
        ></button>
      `);
    }
  }
  return `<div class="base-grid-tiles">${tiles.join("")}</div>`;
}

function renderFixedStructure(structure, state) {
  const area = structureArea(structure, structure.defaultPosition);
  const status = structureStatus(structure.id, state);
  return `
    <button
      type="button"
      class="base-structure base-structure-fixed base-structure-${structure.kind} ${state.ui.selectedStructureId === structure.id ? "is-selected" : ""}"
      data-action="inspect-structure"
      data-structure="${structure.id}"
      style="--x:${area.x1}; --y:${area.y1}; --w:${structure.footprint[0]}; --h:${structure.footprint[1]};"
      ${tooltipAttrs(structureTooltip(structure, state))}
    >
      <span class="structure-status ${status.tone}">${status.label}</span>
      <span class="structure-sprite">${renderStructureSprite(structure.spriteId, 44)}</span>
      <span class="structure-name">${structure.short}</span>
    </button>
  `;
}

function renderPlacedStructure(structure, state) {
  const position = state.shelter.layout?.placed?.[structure.id];
  if (!position) {
    return "";
  }
  const status = structureStatus(structure.id, state);
  return `
    <button
      type="button"
      class="base-structure base-structure-${structure.kind} ${state.ui.selectedStructureId === structure.id ? "is-selected" : ""}"
      data-action="inspect-structure"
      data-structure="${structure.id}"
      style="--x:${position.x}; --y:${position.y}; --w:${structure.footprint[0]}; --h:${structure.footprint[1]};"
      ${tooltipAttrs(structureTooltip(structure, state))}
    >
      <span class="structure-status ${status.tone}">${status.label}</span>
      <span class="structure-sprite">${renderStructureSprite(structure.spriteId, 40)}</span>
      <span class="structure-name">${structure.short}</span>
    </button>
  `;
}

function renderBaseBoard(state) {
  const pendingId = state.ui.pendingPlacementStructureId;
  const { builtIds, structures } = builtStructureDefs(state);
  return `
    <div class="base-board"${tooltipAttrs({ title: "Shelter board", meta: outpostStage(structures.length + 1), body: "Click a built module to inspect it. Arm placement from the rack or inspector, then click a valid tile." })}>
      <div class="base-grid-frame"></div>
      <div class="base-grid-fence"></div>
      ${renderBoardTiles(state, builtIds, pendingId)}
      ${SHELTER_FIXED_STRUCTURES.filter((structure) => structure.id !== "perimeter_fence" || state.upgrades.includes("basic_barricade")).map((structure) => renderFixedStructure(structure, state)).join("")}
      ${structures.map((structure) => renderPlacedStructure(structure, state)).join("")}
      <div class="base-grid-gate">Gate</div>
    </div>
  `;
}

function structureRackItem(structure, state) {
  const placed = Boolean(state.shelter.layout?.placed?.[structure.id]);
  const status = structureStatus(structure.id, state);
  const chips = structureEffects(structure.id).slice(0, 2);
  return `
    <div class="rack-card"${tooltipAttrs(structureTooltip(structure, state))}>
      <div class="rack-top">
        <span class="rack-sprite">${renderStructureSprite(structure.spriteId, 34)}</span>
        <div class="rack-copy">
          <strong>${structure.label}</strong>
          <small>${structure.kind}</small>
        </div>
        <span class="tag ${status.tone}">${status.label}</span>
      </div>
      ${chips.length ? `<div class="chip-row">${tagList(chips)}</div>` : ""}
      <div class="rack-actions">
        ${actionButton({
          action: "start-placing-structure",
          label: placed ? "Move" : "Place",
          meta: `${structure.footprint[0]}x${structure.footprint[1]}`,
          icon: "build",
          variant: "compact secondary",
          data: { structure: structure.id },
          tooltip: {
            title: structure.label,
            meta: placed ? "move" : "place",
            body: `Arm placement and choose a valid tile for ${structure.label}.`,
          },
        })}
      </div>
    </div>
  `;
}

function renderBlueprintRack(state) {
  const buildableStructureIds = new Set(SHELTER_PLACEABLE_STRUCTURES.map((structure) => structure.upgradeId));
  const blueprints = getVisibleUpgrades(state)
    .filter((upgrade) => !state.upgrades.includes(upgrade.id) && buildableStructureIds.has(upgrade.id))
    .slice(0, 6);

  if (!blueprints.length) {
    return "";
  }

  return surfaceCard({
    title: "Blueprints",
    meta: `${blueprints.length}`,
    className: "base-blueprint-card",
    body: `
      <div class="blueprint-mini-grid">
        ${blueprints.map((upgrade) => `
          <div class="blueprint-mini"${tooltipAttrs({
            title: upgrade.name,
            meta: `${upgrade.hours || 1}h`,
            body: `${upgrade.description || "Structure blueprint"} Cost: ${Object.entries(upgrade.cost || {}).map(([resourceId, amount]) => `${resourceLabel(resourceId)} ${amount}`).join(", ") || "none"}.`,
          })}>
            <strong>${upgrade.name}</strong>
            <small>${upgrade.hours || 1}h</small>
          </div>
        `).join("")}
      </div>
    `,
  });
}

function renderStructureInspector(state, derived) {
  const selectedId = state.ui.selectedStructureId || "shelter_core";
  const structure = shelterStructureById(selectedId) || shelterStructureById("shelter_core");
  const status = structureStatus(structure.id, state);
  const cost = getRepairCost(state, structure.id);
  const chips = structureEffects(structure.id);
  const placed = state.shelter.layout?.placed?.[structure.id];
  const positionLabel = placed ? `${placed.x},${placed.y}` : structure.placeable ? "unplaced" : "fixed";
  const body = `
    <div class="base-inspector-hero">
      <span class="base-inspector-sprite">${renderStructureSprite(structure.spriteId, 72)}</span>
      <div>
        <span class="note-label">${structure.kind}</span>
        <h3>${structure.label}</h3>
        <p class="note">${structure.detail}</p>
      </div>
    </div>
    <div class="fact-grid compact-grid">
      <div class="fact"><span>Status</span><strong>${status.label}</strong></div>
      <div class="fact"><span>Footprint</span><strong>${structure.footprint.join("x")}</strong></div>
      <div class="fact"><span>Position</span><strong>${positionLabel}</strong></div>
      <div class="fact"><span>Damage</span><strong>${getStructureDamage(state, structure.id)}</strong></div>
    </div>
    ${chips.length ? `<div class="chip-row">${tagList(chips)}</div>` : ""}
    <div class="detail-list">
      ${structure.placeable ? actionButton({
        action: "start-placing-structure",
        label: state.shelter.layout?.placed?.[structure.id] ? "Move structure" : "Place structure",
        icon: "build",
        variant: "compact",
        data: { structure: structure.id },
      }) : ""}
      ${Object.keys(cost).length ? actionButton({
        action: "repair-structure",
        label: "Repair",
        meta: Object.entries(cost).map(([resourceId, amount]) => `${resourceLabel(resourceId)} ${amount}`).join(" / "),
        icon: "heal",
        variant: "compact secondary",
        data: { structure: structure.id },
      }) : ""}
      ${state.ui.pendingPlacementStructureId ? actionButton({
        action: "clear-placement",
        label: "Cancel placement",
        icon: "retreat",
        variant: "compact secondary",
      }) : ""}
    </div>
  `;

  return surfaceCard({
    title: "Structure inspector",
    meta: status.label,
    className: "base-inspector-card",
    body,
  });
}

function renderSystemsStrip(state, derived) {
  const systems = getShelterSystems(state, derived);
  return `
    <div class="base-system-strip">
      <div class="base-system-card"><span>Food</span><strong>${systems.foodState}</strong><small>${systems.foodInflow.toFixed(2)} / ${systems.foodDrain.toFixed(2)}</small></div>
      <div class="base-system-card"><span>Water</span><strong>${systems.waterState}</strong><small>${systems.waterInflow.toFixed(2)} / ${systems.waterDrain.toFixed(2)}</small></div>
      <div class="base-system-card"><span>Power</span><strong>${systems.powerState}</strong><small>${systems.powerSupply}/${systems.powerDemand || 0}</small></div>
      <div class="base-system-card"><span>Maintenance</span><strong>${systems.maintenanceState}</strong><small>${systems.maintenanceBalance.toFixed(2)}</small></div>
      <div class="base-system-card"><span>Coverage</span><strong>${systems.coverage.toFixed(1)}</strong><small>defense ${derived.defense}</small></div>
    </div>
  `;
}

function renderRack(state) {
  const { structures } = builtStructureDefs(state);
  return surfaceCard({
    title: "Structure rack",
    meta: `${structures.length}`,
    className: "base-rack-card",
    body: structures.length
      ? `
        <div class="rack-grid">
          ${structures.map((structure) => structureRackItem(structure, state)).join("")}
        </div>
      `
      : `<p class="empty-state">Build shelter modules to populate the board.</p>`,
  });
}

function renderOpsSummary(state, derived) {
  const systems = getShelterSystems(state, derived);
  return `
    <div class="detail-list">
      <div class="list-block compact-block">
        <div class="surface-head">
          <h4>Compound state</h4>
          <span class="tag">${outpostStage(builtStructureDefs(state).structures.length + 1)}</span>
        </div>
        <div class="fact-grid compact-grid">
          <div class="fact"><span>Threat</span><strong>${state.shelter.threat.toFixed(1)}</strong></div>
          <div class="fact"><span>Noise</span><strong>${state.shelter.noise.toFixed(1)}</strong></div>
          <div class="fact"><span>Warmth</span><strong>${state.shelter.warmth.toFixed(1)}</strong></div>
          <div class="fact"><span>Damage</span><strong>${Object.keys(state.shelter.damage || {}).length}</strong></div>
        </div>
      </div>
      <div class="list-block compact-block">
        <div class="surface-head">
          <h4>Systems</h4>
          <span class="tag">${systems.powerState}</span>
        </div>
        <div class="chip-row">${tagList([
          `food ${systems.foodState}`,
          `water ${systems.waterState}`,
          `maintenance ${systems.maintenanceState}`,
          `coverage ${systems.coverage.toFixed(1)}`,
        ])}</div>
      </div>
    </div>
  `;
}

function renderBaseScreen(state, derived, isMobile = false) {
  const boardCard = surfaceCard({
    title: "Placement board",
    meta: state.ui.pendingPlacementStructureId ? "placement armed" : outpostStage(builtStructureDefs(state).structures.length + 1),
    className: "base-board-card",
    body: renderBaseBoard(state),
  });
  const inspectorCard = renderStructureInspector(state, derived);
  const rackCard = renderRack(state);
  const blueprintCard = renderBlueprintRack(state);

  if (isMobile) {
    const mapMode = state.ui.mobileShelterMode === "map";
    return `
      <div class="tab-mobile-flow tab-mobile-flow-base">
        <div class="mobile-segmented-control">
          <button type="button" class="${!mapMode ? "is-active" : ""}" data-action="set-mobile-shelter-mode" data-mode="ops">Ops</button>
          <button type="button" class="${mapMode ? "is-active" : ""}" data-action="set-mobile-shelter-mode" data-mode="map">Grid</button>
        </div>
        ${renderSystemsStrip(state, derived)}
        ${mapMode ? boardCard : renderOpsSummary(state, derived)}
        ${mapMode ? inspectorCard : rackCard}
        ${mapMode ? rackCard : blueprintCard}
      </div>
    `;
  }

  return `
    <div class="base-screen">
      ${renderSystemsStrip(state, derived)}
      <div class="base-layout">
        <div class="base-main-column">
          ${boardCard}
          ${rackCard}
        </div>
        <div class="base-side-column">
          ${inspectorCard}
          ${blueprintCard}
        </div>
      </div>
    </div>
  `;
}


// render/tabs-primary.js
const BUILD_UPGRADE_IDS = new Set([
  "shelter_stash",
  "campfire",
  "basic_barricade",
  "food_crate",
  "crafting_bench",
  "weapon_rack",
  "armor_hooks",
  "watch_post",
  "tripwire_grid",
  "ammo_press",
  "repair_rig",
  "rain_collector",
  "water_still",
  "radio_rig",
  "battery_bank",
  "flood_lights",
  "map_board",
  "survivor_cots",
  "smokehouse",
  "trader_beacon",
  "scout_bike",
  "signal_decoder",
  "auto_scavenger",
  "faraday_mesh",
  "relay_tap",
  "bunker_drill",
]);

function workKind(upgrade) {
  if (upgrade.category === "build" || BUILD_UPGRADE_IDS.has(upgrade.id)) {
    return "build";
  }
  return "craft";
}

function upgradeSection(upgrade) {
  if (workKind(upgrade) === "build") return "Base Builds";
  if (upgrade.category === "tool") return "Tools";
  if (upgrade.category === "weapon") return "Weapons";
  if (upgrade.category === "armor") return "Armor";
  return "Consumables";
}

function directiveText(state) {
  if (!state.player.username) {
    return "Set a username, then start the shelter line.";
  }
  if (state.resources.food <= 0) {
    return "Food is thin. Forage or hit dead pantries next.";
  }
  if (!state.upgrades.includes("campfire")) {
    return "Get heat online before the first cold night.";
  }
  if (!state.upgrades.includes("basic_barricade")) {
    return "Fence the edge before the shelter gets loud.";
  }
  if (!state.upgrades.includes("crafting_bench")) {
    return "Build the bench so tools and better gear stop bottlenecking the run.";
  }
  if (!state.equipped.weapon) {
    return "You still need a weapon. Push the workshop or loot the right components.";
  }
  return "Keep the queue moving while the shelter holds.";
}

function sourceActionMarkup(source) {
  if (source.id === "rubble") {
    return { action: "search-rubble", label: "Search", icon: "search" };
  }
  return { action: "search-source", label: "Run lane", icon: "scavenge", data: { source: source.id } };
}

function sourceCard(state, source) {
  const action = sourceActionMarkup(source);
  const chips = [];
  if (source.hours) chips.push(`${source.hours}h`);
  if (typeof source.noise === "number") chips.push(`noise ${source.noise.toFixed(2)}`);
  if (typeof source.threat === "number") chips.push(`threat ${source.threat.toFixed(2)}`);
  (source.tags || []).slice(0, 2).forEach((tag) => chips.push(tag));

  return `
    <div class="ops-source-card"${tooltipAttrs({
      title: source.label,
      meta: "source",
      body: `${source.description || source.label}. ${chips.join(" / ")}`,
    })}>
      <div class="ops-source-head">
        <span class="ops-source-icon">${source.id === "rubble" ? renderEnemySprite("walker", 34) : renderStructureSprite(source.id === "tree_line" ? "watch_post" : "stash", 34)}</span>
        <div>
          <strong>${source.label}</strong>
          <small>${source.description || source.id.replace(/_/g, " ")}</small>
        </div>
      </div>
      <div class="chip-row">${tagList(chips)}</div>
      ${actionButton({
        action: action.action,
        label: action.label,
        meta: source.id === "rubble" ? "manual salvage" : "field run",
        icon: action.icon,
        variant: "compact",
        data: action.data || {},
      })}
    </div>
  `;
}

function renderOpsBoard(state, derived) {
  const sources = getAvailableScavengeSources(state);
  const activeJob = getActiveWorkJob(state);
  const forecast = getNightForecast(state);
  const mainActions = [];

  mainActions.push(actionButton({
    action: "search-rubble",
    label: "Search rubble",
    meta: "salvage + pressure",
    icon: "search",
    variant: "primary",
  }));

  if (sources.some((source) => source.id === "tree_line")) {
    mainActions.push(actionButton({
      action: "search-source",
      label: "Chop trees",
      meta: "wood line",
      icon: "build",
      variant: "compact",
      data: { source: "tree_line" },
    }));
  }

  if (state.upgrades.includes("food_search")) {
    mainActions.push(actionButton({
      action: "forage-food",
      label: "Forage",
      meta: "manual food",
      icon: "food",
      variant: "compact secondary",
    }));
  }

  const directive = surfaceCard({
    title: "Current directive",
    meta: activeJob ? activeJob.kind : "ops",
    className: "ops-directive-card",
    body: `
      <p class="directive-line">${directiveText(state)}</p>
      <div class="action-row action-row-wrap">${mainActions.join("")}</div>
    `,
  });

  const watch = surfaceCard({
    title: "Watch",
    meta: forecast.siege ? "siege" : "night",
    className: "ops-watch-card",
    body: `
      <div class="fact-grid compact-grid">
        <div class="fact"><span>Danger</span><strong>${forecast.dangerScore.toFixed(1)}</strong></div>
        <div class="fact"><span>Breach</span><strong>${Math.round(forecast.breachChance * 100)}%</strong></div>
        <div class="fact"><span>Queue</span><strong>${activeJob ? `${activeJob.hoursRemaining}h` : "idle"}</strong></div>
        <div class="fact"><span>Cond</span><strong>${state.condition}/${derived.maxCondition}</strong></div>
      </div>
    `,
  });

  const sourcesCard = surfaceCard({
    title: "Field lanes",
    meta: `${sources.length}`,
    className: "ops-sources-panel",
    body: `<div class="ops-source-grid">${sources.map((source) => sourceCard(state, source)).join("")}</div>`,
  });

  const logCard = surfaceCard({
    title: "Recent feed",
    meta: `${state.log.length}`,
    className: "ops-log-card",
    body: renderMiniLog(state, 5),
  });

  return `
    <div class="ops-screen">
      <div class="ops-top-row">
        ${directive}
        ${watch}
      </div>
      ${sourcesCard}
      ${logCard}
    </div>
  `;
}

function upgradeResultLabel(upgrade) {
  if (upgrade.resultLabel) {
    return upgrade.resultLabel;
  }
  if (upgrade.effects?.grantItems) {
    const [itemId] = Object.keys(upgrade.effects.grantItems);
    return itemLabel(itemId);
  }
  return upgrade.name;
}

function upgradeTooltip(state, upgrade, missing) {
  const lines = [
    `${upgrade.name}`,
    `Time ${upgrade.hours || 1}h`,
    `Tier ${(upgrade.tier || "field").replace(/_/g, " ")}`,
  ];
  if (upgrade.cost && Object.keys(upgrade.cost).length) {
    lines.push(`Cost: ${formatCost(upgrade.cost)}`);
  }
  if (upgrade.materials && Object.keys(upgrade.materials).length) {
    lines.push(`Materials: ${formatMaterials(upgrade.materials)}`);
  }
  if (upgrade.requiredTools?.length) {
    lines.push(`Tool: ${upgrade.requiredTools.map((itemId) => itemLabel(itemId)).join(" + ")}`);
  }
  if (upgrade.description) {
    lines.push(upgrade.description);
  }
  if (missing.length) {
    lines.push(`Missing: ${missing.join(" / ")}`);
  }
  return {
    title: upgrade.name,
    meta: upgradeSection(upgrade),
    body: lines.join(" • "),
  };
}

function upgradeSprite(upgrade) {
  const structure = shelterStructureById(upgrade.id);
  if (structure) {
    return renderStructureSprite(structure.spriteId, 36);
  }
  if (upgrade.effects?.grantItems) {
    const [itemId] = Object.keys(upgrade.effects.grantItems);
    return renderItemSprite(itemId, ITEMS[itemId], 32);
  }
  return renderStructureSprite("bench", 36);
}

function renderBlueprintCard(state, upgrade) {
  const built = state.upgrades.includes(upgrade.id);
  const ready = !built
    && !getActiveWorkJob(state)
    && canAfford(state, upgrade.cost)
    && hasMaterials(state, upgrade.materials)
    && hasRequiredTools(state, upgrade.requiredTools);
  const missing = [];
  if (!built) {
    Object.entries(upgrade.cost || {}).forEach(([resourceId, amount]) => {
      const have = state.resources[resourceId] || 0;
      if (have < amount) missing.push(`${resourceLabel(resourceId)} ${have}/${amount}`);
    });
    Object.entries(upgrade.materials || {}).forEach(([itemId, amount]) => {
      const have = state.inventory[itemId] || 0;
      if (have < amount) missing.push(`${itemLabel(itemId)} ${have}/${amount}`);
    });
    missingRequiredTools(state, upgrade.requiredTools || []).forEach((itemId) => missing.push(itemLabel(itemId)));
    if (getActiveWorkJob(state) && !ready) {
      missing.push(`queue busy`);
    }
  }
  const toolText = upgrade.requiredTools?.length ? upgrade.requiredTools.map((itemId) => itemLabel(itemId)).join(" + ") : "none";

  return `
    <div class="blueprint-card ${built ? "is-built" : ready ? "is-ready" : "is-blocked"}"${tooltipAttrs(upgradeTooltip(state, upgrade, missing))}>
      <div class="blueprint-card-top">
        <span class="blueprint-sprite">${upgradeSprite(upgrade)}</span>
        <div class="blueprint-copy">
          <strong>${upgrade.name}</strong>
          <small>${upgradeResultLabel(upgrade)}</small>
        </div>
        <span class="tag">${built ? "built" : ready ? "ready" : "blocked"}</span>
      </div>
      <div class="blueprint-facts">
        <span><strong>${formatCost(upgrade.cost || {}) || "free"}</strong></span>
        <span>time ${upgrade.hours || 1}h</span>
        <span>tool ${toolText}</span>
        <span>tier ${(upgrade.tier || "field").replace(/_/g, " ")}</span>
      </div>
      ${!built ? actionButton({
        action: "start-work-job",
        label: ready ? "Queue" : "Blocked",
        meta: ready ? "start job" : missing[0] || "requirements",
        icon: "build",
        variant: "compact",
        disabled: !ready,
        data: { upgrade: upgrade.id },
        tooltip: upgradeTooltip(state, upgrade, missing),
      }) : ""}
    </div>
  `;
}

function renderWorkshopSection(state, title, upgrades) {
  return surfaceCard({
    title,
    meta: `${upgrades.length}`,
    className: "workshop-section-card",
    body: upgrades.length
      ? `<div class="blueprint-grid">${upgrades.map((upgrade) => renderBlueprintCard(state, upgrade)).join("")}</div>`
      : `<p class="empty-state">No ${title.toLowerCase()} ready on the board yet.</p>`,
  });
}

function renderWorkshopQueue(state) {
  const activeJob = getActiveWorkJob(state);
  const body = activeJob
    ? `
      <div class="fact-grid compact-grid">
        <div class="fact"><span>Job</span><strong>${activeJob.label}</strong></div>
        <div class="fact"><span>Kind</span><strong>${activeJob.kind}</strong></div>
        <div class="fact"><span>Left</span><strong>${activeJob.hoursRemaining}h</strong></div>
        <div class="fact"><span>Due</span><strong>${activeJob.completesAt}</strong></div>
      </div>
      <div class="chip-row">${tagList(activeJob.requiredTools?.length ? activeJob.requiredTools.map((itemId) => itemLabel(itemId)) : ["no tool gate"])}</div>
    `
    : `<p class="empty-state">Queue open. Start one build or craft job, then let time pass while the shelter survives.</p>`;

  return surfaceCard({
    title: "Work in Progress",
    meta: activeJob ? "active" : "idle",
    className: "workshop-queue-card",
    body,
  });
}

function renderWorkshopTab(state) {
  const visible = getVisibleUpgrades(state).filter((upgrade) => !state.upgrades.includes(upgrade.id));
  const sections = {
    "Base Builds": [],
    Tools: [],
    Weapons: [],
    Armor: [],
    Consumables: [],
  };
  visible.forEach((upgrade) => {
    sections[upgradeSection(upgrade)].push(upgrade);
  });

  return `
    <div class="workshop-screen">
      ${renderWorkshopQueue(state)}
      ${Object.entries(sections).map(([title, upgrades]) => renderWorkshopSection(state, title, upgrades)).join("")}
    </div>
  `;
}

function routeObjectiveButtons(state) {
  return EXPEDITION_OBJECTIVES.map((objective) => actionButton({
    action: "set-objective",
    label: objective.label,
    meta: objective.id === state.expedition.objective ? "selected" : "objective",
    icon: "route",
    variant: `compact secondary ${objective.id === state.expedition.objective ? "is-selected" : ""}`,
    data: { objective: objective.id },
    tooltip: {
      title: objective.label,
      meta: "objective",
      body: objective.description || objective.id,
    },
  })).join("");
}

function routeApproachButtons(state) {
  return EXPEDITION_APPROACHES.map((approach) => actionButton({
    action: "set-approach",
    label: approach.label,
    meta: approach.id === state.expedition.approach ? "selected" : "approach",
    icon: "route",
    variant: `compact secondary ${approach.id === state.expedition.approach ? "is-selected" : ""}`,
    data: { approach: approach.id },
    tooltip: {
      title: approach.label,
      meta: "approach",
      body: approach.description || approach.id,
    },
  })).join("");
}

function zoneCard(state, zone) {

    })}>
      <div class="route-zone-head">
        <span class="route-zone-icon">${enemy ? renderEnemySprite(enemy, 38) : renderStructureSprite("watch_post", 38)}</span>
        <div>
          <strong>${zone.name}</strong>
          <small>${zone.description || zone.id.replace(/_/g, " ")}</small>
        </div>
        <span class="tag">${zone.tier || "zone"}</span>
      </div>
      <div class="chip-row">${tagList([
        preview ? `time ${preview.timeCost}h` : null,
        preview ? `risk ${preview.riskBand}` : null,
        preview ? `loot ${preview.lootBand}` : null,
      ])}</div>
      <div class="route-zone-actions">
        ${actionButton({
          action: "prepare-zone",
          label: selected ? "Prepared" : "Prepare",
          meta: "staging",
          icon: "route",
          variant: "compact",
          data: { zone: zone.id },
          tooltip: {
            title: zone.name,
